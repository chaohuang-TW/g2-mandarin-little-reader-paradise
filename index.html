<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>圖書館尋寶大冒險</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #273238;
        --muted: #66737a;
        --paper: #fff8e8;
        --panel: #ffffff;
        --line: #dae3df;
        --wood: #b77a4b;
        --gold: #efbd55;
        --green: #4f8b59;
        --blue: #3c78a8;
        --teal: #338f9f;
        --rose: #c95d66;
        --purple: #7460aa;
        --shadow: 0 18px 42px rgba(39, 50, 56, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        background: linear-gradient(180deg, #e7f3f3 0%, #fff7df 54%, #eee7dc 100%);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 900;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .shell {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 22px 0 18px;
      }

      .hero {
        position: relative;
        min-height: 430px;
        overflow: hidden;
        border-radius: 8px;
        background: #143f43;
        box-shadow: var(--shadow);
      }

      .hero::before {
        position: absolute;
        inset: 0;
        content: "";
        background: linear-gradient(90deg, rgba(14, 42, 44, 0.88) 0%, rgba(14, 42, 44, 0.72) 36%, rgba(14, 42, 44, 0.16) 62%, rgba(14, 42, 44, 0) 100%);
        z-index: 1;
      }

      .hero-scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 58% 50%;
      }

      .hero-copy {
        position: relative;
        z-index: 3;
        max-width: 620px;
        padding: 42px;
        color: #fffdf4;
      }

      .kicker,
      .mini {
        margin: 0 0 8px;
        color: var(--blue);
        font-size: 0.88rem;
        font-weight: 900;
      }

      .hero .kicker {
        color: #ffe08a;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 620px;
        margin-bottom: 12px;
        font-size: 4.35rem;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .hero-copy p {
        max-width: 500px;
        font-size: 1.08rem;
        font-weight: 800;
        line-height: 1.75;
      }

      .treasure-peek {
        position: absolute;
        left: auto;
        right: 32px;
        bottom: 20px;
        z-index: 3;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        width: min(720px, calc(100% - 64px));
        pointer-events: none;
      }

      .treasure-token {
        display: grid;
        grid-template-columns: 42px 1fr;
        align-items: center;
        gap: 8px;
        min-height: 58px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.46);
        border-radius: 8px;
        background: rgba(255, 248, 232, 0.92);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
        font-weight: 900;
      }

      .treasure-token span:first-child {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 8px;
        color: #fff;
        background: var(--blue);
      }

      .treasure-token small {
        display: block;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 900;
      }

      .treasure-token:nth-child(2) span:first-child { background: var(--rose); }
      .treasure-token:nth-child(3) span:first-child { background: var(--green); }
      .treasure-token:nth-child(4) span:first-child { background: var(--purple); }

      .hero-art {
        position: absolute;
        right: 32px;
        bottom: 18px;
        z-index: 1;
        width: min(48%, 500px);
        height: 292px;
        pointer-events: none;
      }

      .shelf {
        position: absolute;
        left: 20px;
        right: 20px;
        bottom: 18px;
        height: 160px;
        border-radius: 8px;
        background: #8f5e3b;
        box-shadow: inset 0 -16px rgba(0, 0, 0, 0.14);
      }

      .shelf::before,
      .shelf::after {
        position: absolute;
        left: 12px;
        right: 12px;
        height: 12px;
        border-radius: 8px;
        content: "";
        background: #6e472f;
      }

      .shelf::before {
        top: 68px;
      }

      .shelf::after {
        bottom: 22px;
      }

      .book {
        position: absolute;
        bottom: 48px;
        width: 32px;
        height: 104px;
        border-radius: 5px;
        background: var(--blue);
        box-shadow: inset -6px 0 rgba(0, 0, 0, 0.12);
      }

      .book.a { left: 52px; background: var(--rose); height: 118px; }
      .book.b { left: 90px; background: var(--gold); height: 96px; }
      .book.c { left: 128px; background: var(--green); height: 112px; }
      .book.d { left: 186px; background: var(--purple); height: 106px; }
      .book.e { left: 224px; background: var(--teal); height: 122px; }

      .beetle {
        position: absolute;
        right: 96px;
        bottom: 82px;
        width: 88px;
        height: 68px;
        border-radius: 50%;
        background: #2e3a34;
        box-shadow: inset -12px -10px rgba(0, 0, 0, 0.2);
      }

      .beetle::before,
      .beetle::after {
        position: absolute;
        top: -18px;
        width: 44px;
        height: 40px;
        border-top: 6px solid #2e3a34;
        content: "";
      }

      .beetle::before {
        left: -20px;
        border-left: 6px solid #2e3a34;
        border-radius: 50% 0 0;
        transform: rotate(-20deg);
      }

      .beetle::after {
        right: -20px;
        border-right: 6px solid #2e3a34;
        border-radius: 0 50% 0 0;
        transform: rotate(20deg);
      }

      .pingpong {
        position: absolute;
        right: 34px;
        bottom: 42px;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: #f7f2df;
        box-shadow: inset -7px -9px rgba(0, 0, 0, 0.1);
      }

      .paddle {
        position: absolute;
        right: 72px;
        bottom: 24px;
        width: 62px;
        height: 78px;
        border-radius: 50% 50% 42% 42%;
        background: #c95d66;
        transform: rotate(-28deg);
      }

      .paddle::after {
        position: absolute;
        left: 20px;
        bottom: -48px;
        width: 20px;
        height: 62px;
        border-radius: 10px;
        content: "";
        background: #8a5a38;
      }

      .layout {
        display: grid;
        grid-template-columns: 310px minmax(0, 1fr);
        gap: 16px;
        margin-top: 16px;
      }

      .map,
      .panel {
        border: 2px solid rgba(39, 50, 56, 0.08);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .map {
        padding: 18px;
      }

      .map h2 {
        margin-bottom: 6px;
        font-size: 1.35rem;
      }

      .map p {
        color: var(--muted);
        font-weight: 800;
        line-height: 1.55;
      }

      .trail {
        display: grid;
        gap: 9px;
        margin-top: 16px;
      }

      .stage-tab {
        display: grid;
        grid-template-columns: 38px 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 56px;
        padding: 8px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        text-align: left;
      }

      .stage-tab.is-active {
        border-color: var(--blue);
        background: #e8f4fa;
      }

      .stage-tab.is-done {
        border-color: rgba(79, 139, 89, 0.45);
        background: #edf7ef;
      }

      .badge-icon {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: #fff;
        background: var(--blue);
        font-weight: 900;
      }

      .stage-tab small {
        display: block;
        color: var(--muted);
        font-weight: 800;
      }

      .checkmark {
        color: var(--green);
        font-weight: 900;
      }

      .panel {
        min-height: 620px;
        padding: 24px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 16px;
      }

      .panel-head h2 {
        margin-bottom: 4px;
        font-size: 1.75rem;
      }

      .score {
        display: grid;
        grid-template-columns: repeat(3, minmax(74px, 1fr));
        gap: 8px;
      }

      .score-card {
        min-height: 66px;
        padding: 8px;
        border-radius: 8px;
        background: #f3f0e7;
        text-align: center;
      }

      .score-card strong {
        display: block;
        font-size: 1.42rem;
        line-height: 1.1;
      }

      .score-card span {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 900;
      }

      .prompt {
        min-height: 94px;
        padding: 16px;
        border: 2px dashed #c8d9df;
        border-radius: 8px;
        background: #f8fbfb;
      }

      .level-visual {
        min-height: 178px;
        margin-bottom: 14px;
        overflow: hidden;
        border: 2px solid rgba(39, 50, 56, 0.08);
        border-radius: 8px;
        background: linear-gradient(135deg, #e8f4fa, #fff8e8);
      }

      .level-visual svg {
        display: block;
        width: 100%;
        height: 178px;
      }

      .level-visual text {
        font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: 0;
      }

      .prompt p {
        margin-bottom: 0;
        color: var(--muted);
        font-weight: 800;
        line-height: 1.7;
      }

      .work {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .match-list {
        display: grid;
        gap: 10px;
      }

      .match-row,
      .card,
      .chip {
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }

      .match-row {
        display: grid;
        grid-template-columns: 1fr minmax(150px, 260px);
        align-items: center;
        gap: 10px;
        padding: 12px;
      }

      select,
      input,
      textarea {
        width: 100%;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      select,
      input {
        min-height: 40px;
        padding: 0 10px;
      }

      textarea {
        min-height: 126px;
        padding: 10px;
        resize: vertical;
        line-height: 1.65;
      }

      .choice-grid,
      .chip-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }

      .choice,
      .chip {
        min-height: 54px;
        padding: 10px 12px;
        color: var(--ink);
        background: #fffdf7;
        text-align: left;
      }

      .choice[aria-pressed="true"],
      .chip.selected {
        border-color: var(--blue);
        background: #e8f4fa;
      }

      .choice.good,
      .chip.good {
        border-color: var(--green);
        background: #e9f5ea;
      }

      .choice.bad,
      .chip.bad {
        border-color: var(--rose);
        background: #fff0ec;
      }

      .keyword-group {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #f8fbfb;
      }

      .keyword-text {
        padding: 12px;
        border-radius: 8px;
        background: #fffdf7;
        font-weight: 900;
        line-height: 1.7;
      }

      .sentence-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }

      .sentence-grid,
      .diary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .diary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .feedback {
        min-height: 56px;
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 8px;
        background: #f4f0e8;
        color: var(--muted);
        font-weight: 800;
        line-height: 1.6;
      }

      .feedback.good {
        color: #2c6d45;
        background: #e8f4ea;
      }

      .feedback.try {
        color: #8a5137;
        background: #fff0e8;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .primary {
        padding: 0 18px;
        color: #fff;
        background: var(--green);
      }

      .secondary {
        padding: 0 18px;
        color: var(--ink);
        background: #e8eef0;
      }

      .gold {
        color: #3a2c16;
        background: var(--gold);
      }

      .site-credit {
        margin: 14px 0 0;
        color: rgba(39, 50, 56, 0.72);
        font-size: 0.86rem;
        font-weight: 800;
        line-height: 1.55;
        letter-spacing: 0;
        text-align: center;
      }

      .site-credit p {
        margin: 4px 0;
      }

      @media (max-width: 900px) {
        .shell {
          width: min(100% - 18px, 680px);
          padding-top: 10px;
        }

        .hero {
          min-height: 610px;
        }

        .hero::before {
          background: linear-gradient(180deg, rgba(14, 42, 44, 0.9) 0%, rgba(14, 42, 44, 0.58) 46%, rgba(14, 42, 44, 0.14) 100%);
        }

        .hero-scene {
          object-position: 62% 50%;
        }

        .hero-copy {
          padding: 30px 24px;
        }

        h1 {
          max-width: 330px;
          font-size: 2.55rem;
          line-height: 1.1;
        }

        .hero-copy p {
          max-width: 330px;
        }

        .treasure-peek {
          left: 14px;
          right: 14px;
          bottom: 14px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: auto;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .map {
          order: 2;
        }

        .panel {
          order: 1;
          min-height: auto;
          padding: 18px;
        }

        .level-visual,
        .level-visual svg {
          min-height: 150px;
          height: 150px;
        }

        .panel-head {
          display: grid;
        }

        .match-row,
        .sentence-grid,
        .diary-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        h1 {
          max-width: 280px;
          font-size: 2.18rem;
        }

        .score {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .choice-grid,
        .chip-grid {
          grid-template-columns: 1fr;
        }

        .book.e {
          display: none;
        }

        .treasure-peek {
          grid-template-columns: 1fr;
          gap: 7px;
        }

        .treasure-token {
          min-height: 48px;
          grid-template-columns: 36px 1fr;
          padding: 6px;
        }

        .treasure-token span:first-child {
          width: 36px;
          height: 36px;
        }
      }
    </style>
  </head>

            { left: "印象深刻的事", answer: "我們分成兩組進行大對決，無論是接球、投球都像閃電一樣。", options: ["我和同學。", "我們分成兩組進行大對決，無論是接球、投球都像閃電一樣。", "五月二十九日 星期三 天氣晴。", "我覺得這場球賽雖然沒有分出高下，但我也要利用時間多鍛鍊身體。"] },
            { left: "自己的心情及反省", answer: "我覺得這場球賽雖然沒有分出高下，但我也要利用時間多鍛鍊身體。", options: ["我們分成兩組進行大對決，無論是接球、投球都像閃電一樣。", "五月二十九日 星期三 天氣晴。", "我和同學。", "我覺得這場球賽雖然沒有分出高下，但我也要利用時間多鍛鍊身體。"] }
          ]
        },
        {
          id: "write",
          icon: "桌",
          title: "我的桌球對決日記",
          kicker: "關卡八｜進階寫作挑戰",
          promptTitle: "完成專屬桌球日記",
          promptText: "綜合日期、天氣、主角、經過、心情反省，並使用「不但……而且……」。",
          hint: "至少要寫日期天氣、人物、比賽經過、心情反省，並出現不但和而且。",
          type: "writing"
        }
      ];

      const state = {
        index: 0,
        score: 0,
        diary: 0,
        done: new Set()
      };

      const els = {
        startBtn: document.querySelector("#startBtn"),
        restartBtn: document.querySelector("#restartBtn"),
        gameArea: document.querySelector("#gameArea"),
        finishPanel: document.querySelector("#finishPanel"),
        trail: document.querySelector("#trail"),
        levelKicker: document.querySelector("#levelKicker"),
        levelTitle: document.querySelector("#levelTitle"),
        levelVisual: document.querySelector("#levelVisual"),
        promptTitle: document.querySelector("#promptTitle"),
        promptText: document.querySelector("#promptText"),
        work: document.querySelector("#work"),
        feedback: document.querySelector("#feedback"),
        hintBtn: document.querySelector("#hintBtn"),
        checkBtn: document.querySelector("#checkBtn"),
        nextBtn: document.querySelector("#nextBtn"),
        scoreText: document.querySelector("#scoreText"),
        doneText: document.querySelector("#doneText"),
        noteText: document.querySelector("#noteText"),
        finishText: document.querySelector("#finishText")
      };

      els.startBtn.addEventListener("click", () => {
        document.querySelector(".hero").hidden = true;
        els.finishPanel.hidden = true;
        els.gameArea.hidden = false;
        renderLevel(0);
      });
      els.restartBtn.addEventListener("click", resetGame);
      els.hintBtn.addEventListener("click", () => setFeedback(levels[state.index].hint, ""));
      els.checkBtn.addEventListener("click", checkAnswer);
      els.nextBtn.addEventListener("click", nextLevel);

      function renderLevel(index) {
        state.index = index;
        const level = levels[index];
        els.levelKicker.textContent = level.kicker;
        els.levelTitle.textContent = level.title;
        els.promptTitle.textContent = level.promptTitle;
        els.promptText.textContent = level.promptText;
        els.nextBtn.disabled = true;
        els.checkBtn.disabled = false;
        setFeedback("完成任務後，圖書館寶物會亮起來。", "");
        renderTrail();
        renderScore();
        renderLevelVisual(level);
        els.work.innerHTML = "";
        if (level.type === "quiz") renderQuiz(level);
        if (level.type === "chips") renderChips(level);
        if (level.type === "sentence") renderSentence(level);
        if (level.type === "match") renderMatch(level);
        if (level.type === "writing") renderWriting();
      }

      function renderTrail() {
        els.trail.innerHTML = "";
        levels.forEach((level, index) => {
          const button = document.createElement("button");
          button.className = "stage-tab";
          if (index === state.index) button.classList.add("is-active");
          if (state.done.has(level.id)) button.classList.add("is-done");
          button.type = "button";
          button.innerHTML = `<span class="badge-icon">${level.icon}</span><span>${level.title}<small>${level.kicker.split("｜")[1]}</small></span><span class="checkmark">${state.done.has(level.id) ? "✓" : ""}</span>`;
          button.addEventListener("click", () => renderLevel(index));
          els.trail.appendChild(button);
        });
      }

      function renderScore() {
        els.scoreText.textContent = state.score;
        els.doneText.textContent = `${state.done.size}/8`;
        els.noteText.textContent = state.diary;
      }

      function renderLevelVisual(level) {
        const palette = {
          memory: ["#3c78a8", "#efbd55", "#fff8e8"],
          bookmark: ["#c95d66", "#7460aa", "#fff8e8"],
          food: ["#4f8b59", "#efbd55", "#fff8e8"],
          sentence: ["#338f9f", "#c95d66", "#fff8e8"],
          poster: ["#7460aa", "#efbd55", "#fff8e8"],
          parts: ["#b77a4b", "#3c78a8", "#fff8e8"],
          diary: ["#3c78a8", "#4f8b59", "#fff8e8"],
          write: ["#c95d66", "#3c78a8", "#fff8e8"]
        }[level.id] || ["#3c78a8", "#efbd55", "#fff8e8"];
        const [main, accent, paper] = palette;
        const scenes = {
          memory: `
            <circle cx="570" cy="86" r="42" fill="${accent}" opacity=".24"/>
            <rect x="52" y="40" width="190" height="112" rx="10" fill="${paper}" stroke="${main}" stroke-width="5"/>
            <path d="M76 72h120M76 100h148M76 128h84" stroke="${main}" stroke-width="10" stroke-linecap="round" opacity=".32"/>
            <circle cx="350" cy="82" r="48" fill="none" stroke="${accent}" stroke-width="14"/>
            <path d="M386 118l62 48" stroke="${accent}" stroke-width="18" stroke-linecap="round"/>
            <text x="502" y="102" fill="${main}" font-size="34">找線索</text>`,
          bookmark: `
            <rect x="70" y="34" width="150" height="126" rx="10" fill="${paper}" stroke="${main}" stroke-width="5"/>
            <rect x="236" y="34" width="150" height="126" rx="10" fill="${paper}" stroke="${accent}" stroke-width="5"/>
            <path d="M98 62h86M98 92h76M98 122h96M264 62h86M264 92h76M264 122h96" stroke="#7c8a8f" stroke-width="8" stroke-linecap="round" opacity=".34"/>
            <path d="M124 48v108M290 48v108" stroke="${main}" stroke-width="8" stroke-linecap="round"/>
            <text x="455" y="104" fill="${main}" font-size="34">書名號</text>`,
          food: `
            <circle cx="142" cy="94" r="70" fill="${paper}" stroke="${main}" stroke-width="6"/>
            <circle cx="142" cy="94" r="38" fill="${accent}" opacity=".45"/>
            <path d="M278 40v118M304 40v118M278 92h26" stroke="${main}" stroke-width="10" stroke-linecap="round"/>
            <rect x="378" y="52" width="122" height="88" rx="12" fill="${paper}" stroke="${accent}" stroke-width="5"/>
            <text x="405" y="107" fill="${main}" font-size="38">食</text>
            <text x="512" y="107" fill="${main}" font-size="30">館 飯 飽 餅</text>`,
          sentence: `
            <rect x="54" y="50" width="180" height="88" rx="14" fill="${paper}" stroke="${main}" stroke-width="5"/>
            <rect x="416" y="50" width="180" height="88" rx="14" fill="${paper}" stroke="${accent}" stroke-width="5"/>
            <path d="M238 94 C286 44 364 44 412 94" fill="none" stroke="${accent}" stroke-width="16" stroke-linecap="round"/>
            <text x="96" y="105" fill="${main}" font-size="30">不但</text>
            <text x="452" y="105" fill="${main}" font-size="30">而且</text>
            <circle cx="326" cy="72" r="18" fill="${main}"/>
            <circle cx="326" cy="120" r="18" fill="${accent}"/>`,
          poster: `
            <rect x="84" y="28" width="190" height="138" rx="12" fill="${paper}" stroke="${main}" stroke-width="6"/>
            <rect x="310" y="42" width="178" height="112" rx="10" fill="#fff" stroke="${accent}" stroke-width="5"/>
            <path d="M118 62h132M118 94h94M118 126h118M342 76h118M342 108h88" stroke="#7c8a8f" stroke-width="8" stroke-linecap="round" opacity=".35"/>
            <circle cx="528" cy="84" r="34" fill="${accent}" opacity=".7"/>
            <text x="502" y="142" fill="${main}" font-size="28">活動報</text>`,
          parts: `
            <rect x="58" y="52" width="118" height="90" rx="12" fill="${paper}" stroke="${main}" stroke-width="5"/>
            <rect x="224" y="52" width="118" height="90" rx="12" fill="${paper}" stroke="${accent}" stroke-width="5"/>
            <path d="M178 96h42" stroke="${main}" stroke-width="10" stroke-linecap="round"/>
            <path d="M346 96h54" stroke="${main}" stroke-width="10" stroke-linecap="round"/>
            <rect x="406" y="38" width="142" height="118" rx="14" fill="${accent}" opacity=".28" stroke="${main}" stroke-width="5"/>
            <text x="90" y="109" fill="${main}" font-size="34">广</text>
            <text x="260" y="109" fill="${accent}" font-size="34">車</text>
            <text x="444" y="112" fill="${main}" font-size="42">庫</text>`,
          diary: `
            <rect x="78" y="34" width="210" height="132" rx="14" fill="${paper}" stroke="${main}" stroke-width="5"/>
            <path d="M126 34v132" stroke="${main}" stroke-width="5" opacity=".45"/>
            <path d="M156 68h154M156 100h132M156 132h106" stroke="#7c8a8f" stroke-width="8" stroke-linecap="round" opacity=".34"/>
            <rect x="360" y="48" width="136" height="42" rx="8" fill="${accent}" opacity=".75"/>
            <rect x="360" y="108" width="136" height="42" rx="8" fill="${main}" opacity=".75"/>
            <text x="388" y="79" fill="#fff" font-size="22">日期</text>
            <text x="388" y="139" fill="#fff" font-size="22">心情</text>`,
          write: `
            <rect x="68" y="42" width="210" height="128" rx="14" fill="${paper}" stroke="${main}" stroke-width="5"/>
            <path d="M108 76h138M108 108h118M108 140h152" stroke="#7c8a8f" stroke-width="8" stroke-linecap="round" opacity=".34"/>
            <circle cx="430" cy="92" r="58" fill="${main}" opacity=".18" stroke="${main}" stroke-width="6"/>
            <circle cx="520" cy="86" r="28" fill="#fff" stroke="${accent}" stroke-width="5"/>
            <path d="M466 126l66 54" stroke="${accent}" stroke-width="16" stroke-linecap="round"/>
            <text x="318" y="76" fill="${accent}" font-size="28">桌球日記</text>`
        };
        els.levelVisual.innerHTML = `
          <svg viewBox="0 0 640 178" role="img" aria-label="${level.title}插圖">
            <defs>
              <linearGradient id="visualBg-${level.id}" x1="0" x2="1" y1="0" y2="1">
                <stop stop-color="#eef8f7"/>
                <stop offset="1" stop-color="#fff4d8"/>
              </linearGradient>
            </defs>
            <rect width="640" height="178" fill="url(#visualBg-${level.id})"/>
            <circle cx="604" cy="28" r="80" fill="${accent}" opacity=".18"/>
            <circle cx="56" cy="164" r="86" fill="${main}" opacity=".12"/>
            ${scenes[level.id]}
          </svg>`;
      }

      function renderQuiz(level) {
        const list = document.createElement("div");
        list.className = "work";
        level.rows.forEach((row, rowIndex) => {
          const block = document.createElement("div");
          block.className = "keyword-group";
          block.innerHTML = `<strong>${rowIndex + 1}. ${row.question}</strong>`;
          const grid = document.createElement("div");
          grid.className = "choice-grid";
          row.options.forEach((option) => {
            const button = choiceButton(option, rowIndex);
            grid.appendChild(button);
          });
          block.appendChild(grid);
          list.appendChild(block);
        });
        els.work.appendChild(list);
      }

      function renderChips(level) {
        const wrapper = document.createElement("div");
        wrapper.className = "work";
        level.groups.forEach((group, groupIndex) => {
          const block = document.createElement("div");
          block.className = "keyword-group";
          block.innerHTML = `<strong>${group.label}</strong>`;
          const chips = document.createElement("div");
          chips.className = "chip-grid";
          group.options.forEach((option) => {
            const chip = document.createElement("button");
            chip.className = "chip";
            chip.type = "button";
            chip.textContent = option;
            chip.dataset.group = groupIndex;
            chip.dataset.value = option;
            chip.setAttribute("aria-pressed", "false");
            chip.addEventListener("click", () => {
              chip.classList.toggle("selected");
              chip.setAttribute("aria-pressed", chip.classList.contains("selected") ? "true" : "false");
            });
            chips.appendChild(chip);
          });
          block.appendChild(chips);
          wrapper.appendChild(block);
        });
        els.work.appendChild(wrapper);
      }

      function renderSentence(level) {
        const wrapper = document.createElement("div");
        wrapper.className = "work";
        level.rows.forEach((row, index) => {
          const block = document.createElement("div");
          block.className = "sentence-card";
          block.innerHTML = `<strong>前句：${row.before}</strong><strong>後句：${row.after}</strong>`;
          block.appendChild(selectFor(row.options, index));
          wrapper.appendChild(block);
        });
        els.work.appendChild(wrapper);
      }

      function renderMatch(level) {
        const list = document.createElement("div");
        list.className = "match-list";
        level.rows.forEach((row, index) => {
          const item = document.createElement("label");
          item.className = "match-row";
          item.innerHTML = `<strong>${row.left}</strong>`;
          item.appendChild(selectFor(row.options, index));
          list.appendChild(item);
        });
        els.work.appendChild(list);
      }

      function renderWriting() {
        const box = document.createElement("div");
        box.className = "work";
        box.innerHTML = `
          <div class="keyword-text">草稿：月____日 星期____ 天氣____。今天，我和____一起去打桌球。對手不但發球速度很快，而且____。最後，我的心情覺得____，我希望下次可以____。</div>
          <div class="diary-grid">
            <label class="card" style="padding:12px"><strong>日期與天氣</strong><input id="dateWeather" placeholder="例：六月二日 星期二 天氣晴"></label>
            <label class="card" style="padding:12px"><strong>主角</strong><input id="diaryWho" placeholder="例：我和哥哥"></label>
            <label class="card" style="padding:12px"><strong>心情反省</strong><input id="diaryMood" placeholder="例：下次要多練習接球"></label>
          </div>
          <label class="card" style="padding:12px">
            <strong>桌球日記全文</strong>
            <textarea id="diaryText" placeholder="請寫出完整桌球日記，記得使用「不但……而且……」。"></textarea>
          </label>
        `;
        els.work.appendChild(box);
      }

      function choiceButton(option, rowIndex) {
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.textContent = option;
        button.dataset.row = rowIndex;
        button.dataset.value = option;
        button.setAttribute("aria-pressed", "false");
        button.addEventListener("click", () => selectChoice(button));
        return button;
      }

      function selectChoice(button) {
        els.work.querySelectorAll(`[data-row="${button.dataset.row}"]`).forEach((item) => {
          item.setAttribute("aria-pressed", "false");
          item.classList.remove("selected");
        });
        button.setAttribute("aria-pressed", "true");
        button.classList.add("selected");
      }

      function selectFor(options, index) {
        const select = document.createElement("select");
        select.dataset.index = index;
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "請選擇";
        select.appendChild(placeholder);
        options.forEach((option) => {
          const item = document.createElement("option");
          item.value = option;
          item.textContent = option;
          select.appendChild(item);
        });
        return select;
      }

      function checkAnswer() {
        const level = levels[state.index];
        let correct = false;
        if (level.type === "quiz") {
          correct = level.rows.every((row, rowIndex) => {
            const selected = els.work.querySelector(`[data-row="${rowIndex}"][aria-pressed="true"]`);
            return selected && selected.dataset.value === row.answer;
          });
        }
        if (level.type === "chips") {
          correct = level.groups.every((group, groupIndex) => {
            const selected = [...els.work.querySelectorAll(`[data-group="${groupIndex}"].selected`)].map((item) => item.dataset.value).sort();
            return selected.join("|") === group.answers.slice().sort().join("|");
          });
        }
        if (["sentence", "match"].includes(level.type)) {
          const selects = [...els.work.querySelectorAll("select")];
          correct = selects.every((select, index) => select.value === level.rows[index].answer);
        }
        if (level.type === "writing") {
          const date = document.querySelector("#dateWeather").value.trim();
          const who = document.querySelector("#diaryWho").value.trim();
          const mood = document.querySelector("#diaryMood").value.trim();
          const text = document.querySelector("#diaryText").value.trim();
          correct = date.length >= 6 && who.length >= 2 && mood.length >= 4 && text.length >= 28 && text.includes("不但") && text.includes("而且");
        }
        if (correct) completeLevel(level);
        else setFeedback(level.type === "writing" ? "請把日期天氣、主角、心情反省都填好，全文也要包含「不但」和「而且」。" : "還差一點，再看看提示或重新調整答案。", "try");
      }

      function completeLevel(level) {
        if (!state.done.has(level.id)) {
          state.done.add(level.id);
          state.score += 10;
          state.diary += 1;
        }
        setFeedback("答對了！你找到一件圖書館寶物。", "good");
        els.nextBtn.disabled = false;
        els.checkBtn.disabled = true;
        renderTrail();
        renderScore();
      }

      function nextLevel() {
        const next = levels.findIndex((level) => !state.done.has(level.id));
        if (next === -1) {
          finishGame();
          return;
        }
        renderLevel(next);
      }

      function finishGame() {
        els.gameArea.hidden = true;
        els.finishPanel.hidden = false;
        els.finishText.textContent = `你完成了 ${state.done.size} 個圖書館任務，取得 ${state.score} 顆知識星，累積 ${state.diary} 點日記力。現在你是最厲害的小讀者！`;
      }

      function resetGame() {
        state.index = 0;
        state.score = 0;
        state.diary = 0;
        state.done = new Set();
        document.querySelector(".hero").hidden = false;
        els.gameArea.hidden = true;
        els.finishPanel.hidden = true;
        renderScore();
      }

      function setFeedback(message, type) {
        els.feedback.textContent = message;
        els.feedback.className = `feedback ${type || ""}`.trim();
      }
    </script>
  </body>
</html>
